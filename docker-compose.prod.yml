services:
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-school_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ams_network

  web:
    image: ghcr.io/${GHCR_IMAGE_REPO}:${IMAGE_TAG}
    restart: always
    depends_on:
      - db
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-school_system}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
      SESSION_COOKIE_SECURE: "true"
    networks:
      - ams_network

  nginx:
    image: nginx:alpine
    restart: always
    # No ports exposed to host - Cloudflare Tunnel handles ingress
    # ports:
    #   - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - ams_network

  # Cloudflare Quick Tunnel - Free URL, no domain required
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --protocol http2 --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - ams_network

volumes:
  postgres_data:

networks:
  ams_network:
    driver: bridge
