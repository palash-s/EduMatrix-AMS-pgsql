services:
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-school_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ams_network

  valkey:
    image: valkey/valkey:8-alpine
    restart: always
    networks:
      - ams_network

  web:
    image: ghcr.io/${GHCR_IMAGE_REPO}:latest
    restart: always
    depends_on:
      - db
      - valkey
    command: gunicorn -w 64 -b 0.0.0.0:5000 app:app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-school_system}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
      SESSION_COOKIE_SECURE: "true"
      RATE_LIMIT_STORAGE_URI: redis://valkey:6379
      SQLALCHEMY_POOL_SIZE: "5"
      SQLALCHEMY_MAX_OVERFLOW: "10"


    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - ams_network

  nginx:
    image: nginx:alpine
    restart: always
    # No ports exposed to host - Cloudflare Tunnel handles ingress
    # ports:
    #   - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - ams_network

  # Cloudflare Quick Tunnel - No token required; URL is stable while container runs
  # Note: URL changes if the container is ever recreated. For a stable custom domain,
  # replace with: tunnel --no-autoupdate run --protocol http2 --token ${CLOUDFLARE_TUNNEL_TOKEN}
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx
    networks:
      - ams_network

  # Watchtower - Auto-pulls new images from GHCR and restarts the web container
  # Replaces SSH-based deployment; no Tailscale or exposed SSH port needed
  watchtower:
    image: containrrr/watchtower:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REPO_USER: ${GHCR_USERNAME}
      REPO_PASS: ${GHCR_TOKEN}
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    networks:
      - ams_network

volumes:
  postgres_data:

networks:
  ams_network:
    driver: bridge
