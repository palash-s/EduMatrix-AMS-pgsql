version: '3.8'

services:
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-school_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ams_network

  web:
    image: ghcr.io/${GHCR_IMAGE_REPO}:${IMAGE_TAG}
    restart: always
    depends_on:
      - db
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-school_system}
      FIREBASE_CREDENTIALS_FILE: /app/secrets/firebase-service-account.json
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./secrets/firebase-service-account.json:/app/secrets/firebase-service-account.json:ro
    networks:
      - ams_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - ams_network

volumes:
  postgres_data:

networks:
  ams_network:
    driver: bridge
