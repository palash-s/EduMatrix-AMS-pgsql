name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile (syntax check)
        run: |
          python -m compileall -q \
            app.py \
            sql_connection.py \
            check_staff.py \
            check_student.py \
            check_z.py \
            verify_schedule.py \
            tools \
            migrations

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: local/edumatrix-ams:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validate:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.prod.yml
        env:
          GHCR_IMAGE_REPO: palash-s/edumatrix-ams-pgsql
          IMAGE_TAG: ci
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: school_system
          SECRET_KEY: dummy
        run: |
          docker compose -f docker-compose.prod.yml config >/dev/null
