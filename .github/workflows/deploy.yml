name: Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: commit SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      # Allow non-sensitive connection info to be set either as Secrets or Variables.
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}

      # Required secrets (kept as secrets). These are used by the validation step.
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets/vars
        shell: bash
        run: |
          set -e
          missing=0
          for v in SSH_HOST SSH_USER SSH_PORT DEPLOY_PATH SSH_PRIVATE_KEY GHCR_USERNAME GHCR_TOKEN POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB SECRET_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required Actions secret/variable: ${v}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets/vars are missing. Go to: Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Connect to Tailscale (if configured)
        if: ${{ env.TAILSCALE_AUTHKEY != '' }}
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          args: --accept-dns=false

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          # GHCR image names must be lowercase.
          image_repo_lower=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=${image_repo_lower}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure deploy folders exist
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}" "${{ env.DEPLOY_PATH }}/nginx"

      - name: Upload deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          # scp-action expects comma-separated globs/paths; newline-delimited strings can result in no matches.
          source: docker-compose.prod.yml,nginx/default.conf
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e

            # --- Preflight: Docker must exist on the target server ---
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the server (docker: command not found)."
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                echo "Attempting Docker install using passwordless sudo..."
                sudo apt-get update -y
                sudo apt-get install -y ca-certificates curl gnupg
                sudo install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                sudo chmod a+r /etc/apt/keyrings/docker.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
                sudo apt-get update -y
                sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              else
                echo "::error::Docker is not installed and this SSH user cannot run passwordless sudo."
                echo "Install Docker on the server, then rerun this workflow. For Ubuntu:"
                echo "  sudo apt-get update"
                echo "  sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin"
                exit 1
              fi
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "::error::Docker is installed but 'docker compose' plugin is missing. Install docker-compose-plugin on the server."
              exit 1
            fi

            cat > "${{ env.DEPLOY_PATH }}/.env" <<EOF
            GHCR_IMAGE_REPO=${{ steps.meta.outputs.image_repo }}
            IMAGE_TAG=${{ steps.meta.outputs.tag }}
            POSTGRES_USER=${{ env.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ env.POSTGRES_DB }}
            SECRET_KEY=${{ env.SECRET_KEY }}
            EOF

            # Ensure Docker can pull from GHCR (PAT must have read:packages)
            echo "${{ env.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ env.GHCR_USERNAME }}" --password-stdin

            cd "${{ env.DEPLOY_PATH }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            docker image prune -f
