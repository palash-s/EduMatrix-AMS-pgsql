<!-- Toast + Action Modal (shared include) -->
<style>
    /* TOAST & MODAL STYLES */
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    .toast-exit { animation: fadeOut 0.3s ease-in forwards; }
    .modal-bg-image { background-image: url("{{ url_for('static', filename='images/mit-tp-building.png') }}"); background-size: cover; background-position: center; }
</style>

<div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

<div id="custom-modal" class="fixed inset-0 z-[110] hidden">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="closeActionModal()"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-100">
        <div class="h-32 bg-purple-900 relative modal-bg-image">
            <div class="absolute inset-0 bg-gradient-to-t from-purple-900/90 to-transparent"></div>
            <div class="absolute bottom-4 left-6 text-white">
                <h3 id="modal-title" class="text-2xl font-bold">Confirm Action</h3>
                <p id="modal-subtitle" class="text-purple-200 text-xs uppercase tracking-wider font-semibold">MIT ADT</p>
            </div>
            <button type="button" onclick="closeActionModal()" class="absolute top-4 right-4 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="p-6">
            <p id="modal-message" class="text-gray-600 text-sm leading-relaxed mb-6">Are you sure you want to proceed?</p>

            <div id="modal-input-wrap" class="mb-6 hidden">
                <label for="modal-input" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Input</label>
                <input id="modal-input" type="text" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300" />
                <p id="modal-input-help" class="mt-2 text-xs text-gray-500">Press Enter to submit.</p>
            </div>

            <div class="flex gap-3">
                <button type="button" onclick="closeActionModal()" class="flex-1 py-2.5 px-4 border border-gray-200 text-gray-600 font-bold rounded-xl hover:bg-gray-50 transition-colors text-sm">Cancel</button>
                <button type="button" id="modal-confirm-btn" class="flex-1 py-2.5 px-4 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 shadow-lg shadow-purple-200 transition-all transform hover:scale-[1.02] text-sm flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                    <span>Confirm</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js', v='20251215') }}"></script>

<script>
    // --- Toast & Modal Helpers (shared) ---
    // Global flag to help dashboards pause auto-refresh while a modal is open.
    window.__amsActionModalOpen = false;

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        const colors = type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800';
        const icon = type === 'success' ? 'check-circle' : 'alert-circle';

        toast.className = `${colors} border px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[300px] toast-enter pointer-events-auto`;
        toast.innerHTML = `
            <i data-lucide="${icon}" class="w-5 h-5"></i>
            <span class="font-medium text-sm">${msg}</span>
            <button type="button" onclick="this.parentElement.remove()" class="ml-auto opacity-50 hover:opacity-100"><i data-lucide="x" class="w-4 h-4"></i></button>
        `;

        container.appendChild(toast);
        if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();

        setTimeout(() => {
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    let currentConfirmCallback = null;

    function setModalConfirmLabel(label) {
        const confirmBtn = document.getElementById('modal-confirm-btn');
        if (!confirmBtn) return;
        const span = confirmBtn.querySelector('span');
        if (span) span.innerText = label || 'Confirm';
    }

    function setModalInputVisibility(visible) {
        const wrap = document.getElementById('modal-input-wrap');
        if (!wrap) return;
        if (visible) wrap.classList.remove('hidden');
        else wrap.classList.add('hidden');
    }

    function showConfirm(title, msg, callback, subtitle) {
        const titleEl = document.getElementById('modal-title');
        const messageEl = document.getElementById('modal-message');
        const subtitleEl = document.getElementById('modal-subtitle');

        if (titleEl) titleEl.innerText = title || 'Confirm Action';
        if (messageEl) messageEl.innerText = msg || 'Are you sure you want to proceed?';
        if (subtitleEl) subtitleEl.innerText = subtitle || 'MIT ADT';

        setModalConfirmLabel('Confirm');
        setModalInputVisibility(false);

        currentConfirmCallback = callback;
        const modal = document.getElementById('custom-modal');
        if (modal) modal.classList.remove('hidden');
        window.__amsActionModalOpen = true;

        if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
    }

    function showPrompt(title, msg, callback, subtitle, defaultValue) {
        const titleEl = document.getElementById('modal-title');
        const messageEl = document.getElementById('modal-message');
        const subtitleEl = document.getElementById('modal-subtitle');
        const inputEl = document.getElementById('modal-input');
        const helpEl = document.getElementById('modal-input-help');

        if (titleEl) titleEl.innerText = title || 'Input Required';
        if (messageEl) messageEl.innerText = msg || 'Please provide a value to continue.';
        if (subtitleEl) subtitleEl.innerText = subtitle || 'MIT ADT';

        setModalConfirmLabel('Submit');
        setModalInputVisibility(true);

        if (helpEl) helpEl.innerText = 'Press Enter to submit.';
        if (inputEl) {
            inputEl.value = defaultValue || '';
            inputEl.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const btn = document.getElementById('modal-confirm-btn');
                    if (btn) btn.click();
                }
            };
            setTimeout(() => inputEl.focus(), 0);
        }

        currentConfirmCallback = async () => {
            const value = inputEl ? inputEl.value : '';
            return callback ? callback(value) : undefined;
        };

        const modal = document.getElementById('custom-modal');
        if (modal) modal.classList.remove('hidden');
        window.__amsActionModalOpen = true;
        if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
    }

    function closeActionModal() {
        const modal = document.getElementById('custom-modal');
        if (modal) modal.classList.add('hidden');
        currentConfirmCallback = null;
        window.__amsActionModalOpen = false;

        const inputEl = document.getElementById('modal-input');
        if (inputEl) inputEl.onkeydown = null;
        setModalInputVisibility(false);
        setModalConfirmLabel('Confirm');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const confirmBtn = document.getElementById('modal-confirm-btn');
        if (!confirmBtn) return;
        if (confirmBtn.dataset.toastModalBound === '1') return;
        confirmBtn.dataset.toastModalBound = '1';
        confirmBtn.addEventListener('click', async () => {
            try {
                if (currentConfirmCallback) await currentConfirmCallback();
            } finally {
                closeActionModal();
            }
        });
    });
</script>
