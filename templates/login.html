<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MIT ADT University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Merriweather', serif; }
        .mit-purple { color: #48166d; } .bg-mit-purple { background-color: #48166d; }
        .hover-mit-purple:hover { background-color: #350f50; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .aurora-line { background: linear-gradient(90deg, #48166d, #f17736, #00a887, #48166d); background-size: 300% 100%; animation: aurora-move 3s linear infinite; box-shadow: 0 0 10px rgba(72, 22, 109, 0.5), 0 0 20px rgba(241, 119, 54, 0.3), 0 0 30px rgba(0, 168, 135, 0.2); }
        @keyframes aurora-move { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
    
    <!-- SECURITY: Server-side session check - redirect if already logged in -->
    <script>
        (async function() {
            try {
                const res = await fetch('/api/me', { credentials: 'same-origin' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.must_change_password) {
                        window.location.replace('/change-password');
                        return;
                    }
                    const paths = { 'Staff': '/staff/dashboard', 'Student': '/student/dashboard', 'Admin': '/admin/dashboard', 'SuperAdmin': '/superadmin/dashboard', 'Parent': '/parent/dashboard' };
                    if (data.role && paths[data.role]) {
                        window.location.replace(paths[data.role]);
                    }
                }
            } catch (e) { /* Not logged in or network error - stay on login */ }
        })();
    </script>
</head>
<body class="bg-white h-screen overflow-hidden flex">

    <!-- LEFT SIDE -->
    <div class="hidden lg:flex w-[55%] relative bg-gray-900 items-center justify-center overflow-hidden">
        <img src="{{ url_for('static', filename='images/campus_bg.jpg') }}" class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay" onerror="this.src='https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=2070&auto=format&fit=crop'">
        <div class="absolute inset-0 bg-gradient-to-br from-[#48166d] via-[#48166d]/90 to-[#2d0d45] mix-blend-multiply"></div>
        <div class="relative z-10 max-w-xl px-12 text-white">
            <div class="mb-8">
                <div class="h-1 w-20 bg-orange-400 mb-6"></div> 
                <h1 class="text-5xl font-bold leading-tight mb-6">EduMatrix AMS</h1>
                <h2 class="text-2xl font-light text-purple-100 serif italic">Empowering Education with Smart Attendance.</h2>
            </div>
            <p class="text-lg text-purple-200 leading-relaxed font-light">Streamline operations, track engagement, and simplify workflows with our centralized platform.</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="w-full lg:w-[45%] flex flex-col relative bg-white overflow-y-auto">
        <div class="absolute top-0 left-0 w-full p-8 sm:p-12 z-20 flex justify-between items-start">
            <img src="{{ url_for('static', filename='images/mit_logo.png') }}" class="h-16 w-auto object-contain" onerror="this.style.display='none'">
            <img src="{{ url_for('static', filename='images/Edumatrix-AMS-logo.png') }}" class="h-16 w-auto object-contain" onerror="this.style.display='none'">
        </div>

        <div class="flex-grow flex flex-col justify-center px-8 sm:px-16 lg:px-24 fade-in">
            <div class="mb-10 mt-32 lg:mt-0">
                <h3 class="text-sm font-bold tracking-widest text-gray-400 uppercase mb-2">Welcome to</h3>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 leading-tight">MIT Art, Design and Technology University, Pune</h1>
                <div class="h-1.5 w-full aurora-line mt-5 rounded-full"></div>
            </div>

            <div id="error-box" class="hidden mb-6 p-4 rounded-lg bg-red-50 border-l-4 border-red-500 flex items-start gap-3"><i data-lucide="alert-triangle" class="w-5 h-5 text-red-600 mt-0.5"></i><div class="flex-1"><h4 class="text-sm font-bold text-red-800">Login Failed</h4><p id="error-text" class="text-sm text-red-700 mt-1">Error message</p></div></div>

            <form id="login-form" class="space-y-6">
                <div class="group">
                    <label class="block text-sm font-medium text-gray-700 mb-1 group-focus-within:mit-purple transition-colors">University ID / Email</label>
                    <div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="user" class="h-5 w-5 text-gray-400 group-focus-within:mit-purple transition-colors"></i></div><input id="username" name="username" type="text" required class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#48166d] focus:border-transparent outline-none transition-all text-gray-900 placeholder-gray-400" placeholder="e.g. EMP1022"></div>
                </div>
                <div class="group">
                    <div class="flex justify-between items-center mb-1"><label class="block text-sm font-medium text-gray-700 group-focus-within:mit-purple transition-colors">Password</label></div>
                    <div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="lock" class="h-5 w-5 text-gray-400 group-focus-within:mit-purple transition-colors"></i></div><input id="password" name="password" type="password" required class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#48166d] focus:border-transparent outline-none transition-all text-gray-900 placeholder-gray-400" placeholder="••••••••"></div>
                </div>
                <button type="submit" id="submit-btn" class="w-full py-3.5 px-4 bg-mit-purple hover-mit-purple text-white text-sm font-bold rounded-lg shadow-lg shadow-purple-900/20 transition-all transform active:scale-[0.98] flex justify-center items-center gap-2"><span id="btn-text">Sign In to Dashboard</span><i data-lucide="arrow-right" class="w-4 h-4"></i><svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></button>
            </form>
        </div>

        <div class="p-8 text-center sm:text-left border-t border-gray-100 bg-gray-50"><p class="text-xs text-gray-500">&copy; 2025 DataBae on Cloud 9.</p></div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username'); const passwordInput = document.getElementById('password'); const errorBox = document.getElementById('error-box'); const errorText = document.getElementById('error-text'); const btnText = document.getElementById('btn-text'); const btnSpinner = document.getElementById('btn-spinner'); const submitBtn = document.getElementById('submit-btn');
            errorBox.classList.add('hidden'); btnText.classList.add('hidden'); btnSpinner.classList.remove('hidden'); submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: usernameInput.value, password: passwordInput.value }) });

                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                let data = null;
                if (contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    const preview = (text || '').trim().slice(0, 160);
                    throw new Error(`Server returned ${response.status} ${response.statusText} (non-JSON). ${preview}`);
                }
                if (response.ok) {
                    // Server-side session established - redirect based on server response
                    btnSpinner.classList.add('hidden'); btnText.classList.remove('hidden'); btnText.innerText = "Success! Redirecting..."; submitBtn.classList.remove('bg-mit-purple', 'hover-mit-purple'); submitBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                    
                    // --- CRITICAL FIX: Use replace() to overwrite history ---
                    setTimeout(() => { window.location.replace(data.redirect_url); }, 800);
                } else { throw new Error(data.error || 'Login failed'); }
            } catch (err) { errorText.innerText = err.message; errorBox.classList.remove('hidden'); btnText.classList.remove('hidden'); btnText.innerText = "Sign In to Dashboard"; btnSpinner.classList.add('hidden'); submitBtn.disabled = false; }
        });
    </script>
</body>
</html>
