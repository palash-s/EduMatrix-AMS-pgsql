<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Events - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700&display=swap'); 
        body { font-family: 'Inter', sans-serif; }
        .mit-purple { color: #48166d; }
        .bg-mit-purple { background-color: #48166d; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <h1 class="text-xl font-bold text-gray-900 mit-purple" style="font-family: 'Merriweather', serif;">Event & Coordinator Management</h1>
        </div>
        <button onclick="openModal()" class="px-4 py-2 bg-mit-purple text-white text-sm font-bold rounded-lg hover:bg-[#350f50] flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Assign New Coordinator
        </button>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase text-gray-500 font-semibold">
                        <th class="p-4">Event Name</th>
                        <th class="p-4">Date</th>
                        <th class="p-4">Assigned Coordinator</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="event-table-body" class="divide-y divide-gray-100">
                    <tr><td colspan="4" class="p-8 text-center text-gray-400">Loading events...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- CREATE/EDIT MODAL -->
    <div id="event-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-xl shadow-2xl p-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4" id="modal-title">Assign Coordinator</h2>
            
            <input type="hidden" id="event-id">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Event Name</label>
                    <input type="text" id="event-name" placeholder="e.g. Annual Sports Day" class="w-full p-2 border rounded focus:ring-2 focus:ring-[#48166d] outline-none">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Event Date</label>
                    <input type="date" id="event-date" class="w-full p-2 border rounded focus:ring-2 focus:ring-[#48166d] outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Assign Faculty</label>
                    <select id="event-coordinator" class="w-full p-2 border rounded focus:ring-2 focus:ring-[#48166d] outline-none bg-white">
                        <option value="">Loading staff...</option>
                    </select>
                    <p class="text-[10px] text-gray-400 mt-1">This faculty member will get the 'Event Manager' widget.</p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description (Optional)</label>
                    <textarea id="event-desc" rows="2" class="w-full p-2 border rounded focus:ring-2 focus:ring-[#48166d] outline-none"></textarea>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg text-sm font-bold">Cancel</button>
                <button onclick="saveEvent()" class="px-4 py-2 bg-mit-purple text-white rounded-lg text-sm font-bold hover:bg-[#350f50]">Save Assignment</button>
            </div>
        </div>
    </div>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        let staffList = [];

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            const res = await fetch('/api/admin/events');
            const data = await res.json();
            
            staffList = data.staff_directory;
            renderTable(data.events);
            populateStaffDropdown();
        }

        function renderTable(events) {
            const tbody = document.getElementById('event-table-body');
            if(events.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">No events found. Create one to assign a coordinator.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = events.map(evt => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 font-bold text-gray-800">${evt.name}</td>
                    <td class="p-4 text-sm text-gray-600">${evt.date}</td>
                    <td class="p-4">
                        <span class="inline-flex items-center gap-2 bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-xs font-bold border border-purple-100">
                            <i data-lucide="user" class="w-3 h-3"></i> ${evt.coordinator_name}
                        </span>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="editEvent(${evt.id}, '${evt.name}', '${evt.date}', '${evt.coordinator_id}', '${evt.description}')" class="p-2 text-gray-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                        <button onclick="deleteEvent(${evt.id})" class="p-2 text-gray-400 hover:text-red-600"><i data-lucide="trash" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function populateStaffDropdown() {
            const select = document.getElementById('event-coordinator');
            select.innerHTML = '<option value="">-- Select Faculty --</option>' + 
                staffList.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        async function saveEvent() {
            const payload = {
                id: document.getElementById('event-id').value || null,
                name: document.getElementById('event-name').value,
                date: document.getElementById('event-date').value,
                coordinator_id: document.getElementById('event-coordinator').value,
                description: document.getElementById('event-desc').value
            };

            if(!payload.name || !payload.date || !payload.coordinator_id) return showToast("Please fill all fields", "error");

            const res = await fetch('/api/admin/save_event', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok) { closeModal(); loadData(); }
            else showToast("Failed to save", "error");
        }

        async function deleteEvent(id) {
            return showConfirm(
                "Confirm Action",
                "Delete this event? This will remove all student participation records for it.",
                async () => {
                    const res = await fetch('/api/admin/delete_event', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id })
                    });
                    if (!res.ok) return showToast("Failed", "error");
                    loadData();
                },
                "Events"
            );
        }

        function openModal() {
            document.getElementById('event-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Assign New Coordinator";
            document.getElementById('event-id').value = "";
            document.getElementById('event-name').value = "";
            document.getElementById('event-date').value = "";
            document.getElementById('event-coordinator').value = "";
            document.getElementById('event-desc').value = "";
        }

        function editEvent(id, name, date, coordId, desc) {
            openModal();
            document.getElementById('modal-title').innerText = "Edit Assignment";
            document.getElementById('event-id').value = id;
            document.getElementById('event-name').value = name;
            document.getElementById('event-date').value = date;
            document.getElementById('event-coordinator').value = coordId;
            document.getElementById('event-desc').value = desc;
        }

        function closeModal() { document.getElementById('event-modal').classList.add('hidden'); }
    </script>
</body>
</html>
