<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap'); 
        body { font-family: 'Inter', sans-serif; }
        .mit-purple { color: #48166d; } .bg-mit-purple { background-color: #48166d; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <div>
                <h1 class="font-bold text-lg mit-purple" id="subject-name">Loading...</h1>
                <p class="text-xs text-gray-500" id="class-info">...</p>
            </div>
        </div>
        <div class="text-right">
            <span class="block text-xs font-bold text-gray-400 uppercase">Date</span>
            <span class="block text-sm font-bold text-gray-800" id="session-date">--</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto mt-6 px-4">
        
        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm text-center">
                <span class="text-xs text-gray-400 font-bold uppercase">Total</span>
                <p class="text-xl font-bold text-gray-800" id="count-total">0</p>
            </div>
            <div class="bg-green-50 p-3 rounded-lg border border-green-100 shadow-sm text-center">
                <span class="text-xs text-green-600 font-bold uppercase">Present</span>
                <p class="text-xl font-bold text-green-700" id="count-present">0</p>
            </div>
            <div class="bg-red-50 p-3 rounded-lg border border-red-100 shadow-sm text-center">
                <span class="text-xs text-red-600 font-bold uppercase">Absent</span>
                <p class="text-xl font-bold text-red-700" id="count-absent">0</p>
            </div>
        </div>

        <!-- Student List -->
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div id="student-list" class="divide-y divide-gray-100">
                <p class="p-8 text-center text-gray-400">Loading student list...</p>
            </div>
        </div>

        <!-- LESSON LOG INPUT -->
        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-20 shadow-sm">
            <h3 class="text-xs font-bold text-blue-700 uppercase mb-2 flex items-center gap-2">
                <i data-lucide="book-open" class="w-4 h-4"></i> Lesson Tracking
            </h3>
            <select id="topic-select" class="w-full p-2 border border-blue-200 rounded-lg text-sm bg-white outline-none">
                <option value="">-- Select Topic Covered (Optional) --</option>
            </select>
        </div>

        <!-- Submit Button (Fixed Bottom) -->
        <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg z-40">
            <div class="max-w-3xl mx-auto flex gap-3">
                <button onclick="markAllPresent()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-lg hover:bg-gray-200 transition-colors">Mark All Present</button>
                <button onclick="submitAttendance()" id="submit-btn" class="flex-1 py-3 bg-mit-purple text-white font-bold rounded-lg hover:bg-[#350f50] shadow-md transition-colors">Submit</button>
            </div>
        </div>

    </main>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        
        // Get Params
        const urlParams = new URLSearchParams(window.location.search);
        const scheduleId = urlParams.get('schedule_id');
        const dateParam = urlParams.get('date');

        let currentStudentData = [];
        let isLocked = false;

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            try {
                const res = await fetch(`/api/attendance/sheet?schedule_id=${scheduleId}&date=${dateParam}`);
                const data = await res.json();

                // ERROR CHECKING
                if (!res.ok) {
                    throw new Error(data.error || "Failed to load data");
                }

                // 1. Set Header Info
                document.getElementById('subject-name').innerText = data.subject_name;
                document.getElementById('class-info').innerText = `${data.class_name} • ${data.time}`;
                document.getElementById('session-date').innerText = data.date_display;
                
                isLocked = data.is_locked;
                
                // 2. Set Data
                currentStudentData = data.students || []; // Fallback to empty array
                
                // 3. Render
                renderStudents(currentStudentData);
                
                // 4. Handle Lock State
                const btn = document.getElementById('submit-btn');
                if (isLocked) {
                    btn.disabled = true;
                    btn.innerText = "Attendance Locked";
                    btn.classList.add('bg-gray-400', 'cursor-not-allowed');
                    btn.classList.remove('bg-mit-purple');
                }

                // Load Topics
                const topicSelect = document.getElementById('topic-select');
                try {
                    const syllRes = await fetch(`/api/academic/get_syllabus?subject_id=${data.subject_id}`);
                    const syllData = await syllRes.json();
                    if(syllData.syllabus) {
                        topicSelect.innerHTML = '<option value="">-- Select Topic Covered --</option>' + 
                        syllData.syllabus.filter(t => t.status === 'Pending').map(t => 
                            `<option value="${t.id}">Unit ${t.unit}: ${t.topic}</option>`
                        ).join('');
                    }
                } catch(e) { console.error('Failed to load topics:', e); }

            } catch (e) {
                console.error("Attendance Load Error:", e);
                document.getElementById('student-list').innerHTML = `
                    <div class="p-8 text-center text-red-500">
                        <i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                        <p>Error: ${e.message}</p>
                    </div>`;
                lucide.createIcons();
            }
        }

        function renderStudents(students) {
            // SAFETY CHECK: Ensure students is an array
            if (!students || !Array.isArray(students)) {
                console.error("Data integrity error: 'students' is not an array", students);
                document.getElementById('student-list').innerHTML = `<p class="p-8 text-center text-red-400">Invalid Data Received</p>`;
                return;
            }

            const list = document.getElementById('student-list');
            
            // Calculate Stats
            const total = students.length;
            // Count Present, OD, ML, CL as "Present" for the stats logic
            const present = students.filter(s => ['Present', 'OnDuty', 'OD', 'ML', 'CL'].includes(s.status)).length;
            
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-present').innerText = present;
            document.getElementById('count-absent').innerText = total - present;

            if (total === 0) {
                list.innerHTML = `<p class="p-8 text-center text-gray-400">No students found in this batch/class.</p>`;
                return;
            }

            list.innerHTML = students.map(s => {
                let btnClass = '';
                let btnText = s.status;
                let rowClass = '';
                let labelHtml = '';

                // Visual Logic
                if (s.status === 'Present') {
                    btnClass = 'bg-green-100 text-green-700 border-green-200';
                    btnText = 'P';
                } else if (s.status === 'Absent') {
                    btnClass = 'bg-red-100 text-red-700 border-red-200';
                    btnText = 'A';
                    rowClass = 'bg-red-50/30';
                } else if (['OnDuty', 'OD'].includes(s.status)) {
                    btnClass = 'bg-blue-100 text-blue-700 border-blue-200';
                    btnText = 'OD';
                    labelHtml = `<span class="ml-2 text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-bold border border-blue-100">Event OD</span>`;
                } else if (s.status === 'ML') {
                    btnClass = 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    btnText = 'ML';
                    labelHtml = `<span class="ml-2 text-[10px] bg-yellow-50 text-yellow-600 px-1.5 py-0.5 rounded font-bold border border-yellow-100">Medical</span>`;
                } else if (s.status === 'CL') {
                    btnClass = 'bg-purple-100 text-purple-700 border-purple-200';
                    btnText = 'CL';
                    labelHtml = `<span class="ml-2 text-[10px] bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded font-bold border border-purple-100">Casual</span>`;
                }

                // If extra status label exists from backend (e.g. "Approved Sick")
                if (s.status_label && !labelHtml) {
                    labelHtml = `<span class="ml-2 text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200">${s.status_label}</span>`;
                }

                return `
                <div class="flex items-center justify-between p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors ${rowClass}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-sm border border-gray-200">${s.name.charAt(0)}</div>
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${s.name}</p>
                            <p class="text-xs text-gray-500 font-mono flex items-center mt-0.5">${s.roll_no} ${labelHtml}</p>
                        </div>
                    </div>
                    
                    <button onclick="toggleStatus('${s.student_id}')" class="w-12 h-12 rounded-xl font-bold text-lg flex items-center justify-center border transition-all shadow-sm active:scale-95 ${btnClass}">
                        ${btnText}
                    </button>
                </div>`;
            }).join('');
            
            lucide.createIcons();
        }

        function toggleStatus(studentId) {
            if (isLocked) return; // Prevent editing if locked

            const s = currentStudentData.find(st => st.student_id === studentId);
            if (s) {
                // Logic: P -> A -> P
                // If it was OD/ML/CL, clicking it overrides it to 'Present', then 'Absent'
                if (s.status === 'Absent') {
                    s.status = 'Present';
                } else {
                    s.status = 'Absent';
                }
                renderStudents(currentStudentData);
            }
        }

        function markAllPresent() {
            if (isLocked) return;
            currentStudentData.forEach(s => {
                // Don't override special statuses like OD/ML unless necessary?
                // Usually "Mark All Present" implies resetting Absents to Presents.
                // We will preserve OD/ML/CL to be safe.
                if (s.status === 'Absent') s.status = 'Present';
            });
            renderStudents(currentStudentData);
        }

        async function submitAttendance() {
            if (isLocked) return;

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                const submittedBy = sessionStorage.getItem('user_id');
                const payload = {
                    schedule_id: scheduleId,
                    date: dateParam,
                    students: currentStudentData,
                    topic_id: document.getElementById('topic-select').value,
                    submitted_by: submittedBy
                };

                const res = await fetch('/api/attendance/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showToast("Attendance Saved Successfully!");
                    setTimeout(() => { window.location.href = '/staff/dashboard'; }, 600);
                } else {
                    const err = await res.json();
                    showToast("Error: " + (err.error || "Failed"), "error");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                showToast("Network Error", "error");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
