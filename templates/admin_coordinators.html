<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Roles - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mit-purple { color: #48166d; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <h1 class="text-xl font-bold text-gray-900 mit-purple" style="font-family: 'Merriweather', serif;">Assign Additional Roles</h1>
        </div>
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-box" onkeyup="filterTable()" placeholder="Search Faculty..." class="pl-9 pr-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-[#48166d] outline-none w-64">
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-xs uppercase text-gray-500 font-semibold border-b border-gray-200">
                    <tr>
                        <th class="p-4">Faculty Name</th>
                        <th class="p-4 text-center">Event Coord</th>
                        <th class="p-4 text-center">AMC Member</th>
                        <th class="p-4 text-center">AMC Head</th>
                    </tr>
                </thead>
                <tbody id="staff-table-body" class="divide-y divide-gray-100">
                    <tr><td colspan="4" class="p-8 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <p class="text-xs text-gray-400 mt-4 text-center">* Note: Only one faculty member can be assigned as AMC Head at a time.</p>
    </main>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        let staffData = [];

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            const res = await fetch('/api/admin/coordinators');
            const data = await res.json();
            staffData = data.staff;
            renderTable(staffData);
        }

        function renderTable(list) {
            const tbody = document.getElementById('staff-table-body');
            tbody.innerHTML = list.map(s => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4">
                        <p class="font-bold text-gray-800">${s.name}</p>
                        <p class="text-xs text-gray-500">${s.emp_code} • ${s.dept}</p>
                    </td>
                    
                    <!-- Event Coord Toggle -->
                    <td class="p-4 text-center">
                        <button onclick="toggleRole('${s.id}', 'event')" 
                            class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${s.is_coordinator ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-300'} mx-auto">
                            <i data-lucide="${s.is_coordinator ? 'check' : 'minus'}" class="w-4 h-4"></i>
                        </button>
                    </td>

                    <!-- AMC Member Toggle -->
                    <td class="p-4 text-center">
                        <button onclick="toggleRole('${s.id}', 'amc_member')" 
                            class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${s.is_amc_member ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-300'} mx-auto">
                            <i data-lucide="${s.is_amc_member ? 'check' : 'minus'}" class="w-4 h-4"></i>
                        </button>
                    </td>

                    <!-- AMC Head Toggle -->
                    <td class="p-4 text-center">
                        <button onclick="toggleRole('${s.id}', 'amc_head')" 
                            class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${s.is_amc_head ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-300'} mx-auto">
                            <i data-lucide="${s.is_amc_head ? 'crown' : 'minus'}" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function toggleRole(staffId, roleType) {
            // Optimistic Update (Optional visual feedback before reload)
            const res = await fetch('/api/admin/toggle_role', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ staff_id: staffId, role_type: roleType })
            });
            if(res.ok) loadData();
            else showToast("Failed to update", "error");
        }

        function filterTable() {
            const term = document.getElementById('search-box').value.toLowerCase();
            renderTable(staffData.filter(s => s.name.toLowerCase().includes(term) || s.dept.toLowerCase().includes(term)));
        }
    </script>
</body>
</html>
