<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Approvals - MIT ADT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap'); 
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Merriweather', serif; }
        .mit-purple { color: #48166d; }
        .mit-bg-purple { background-color: #48166d; }
        .mit-teal { color: #00a887; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="font-bold text-lg mit-purple tracking-tight">Leave Requests</h1>
        </div>
        <div class="text-xs font-bold bg-purple-50 text-purple-700 px-2 py-1 rounded-lg">
            Pending: <span id="pending-count">0</span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto mt-6 px-4">
        <div id="request-list" class="space-y-4">
            <!-- Loading Skeleton -->
            <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100 animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-1/3 mb-4"></div>
                <div class="h-16 bg-gray-100 rounded"></div>
            </div>
        </div>
    </main>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        const userId = sessionStorage.getItem('user_id');

        document.addEventListener('DOMContentLoaded', loadRequests);

        async function loadRequests() {
            if (!userId) { window.location.href = '/'; return; }
            
            try {
                const response = await fetch(`/api/staff/leave_requests?user_id=${userId}`);
                const data = await response.json();
                
                document.getElementById('pending-count').innerText = data.requests.length;
                renderList(data.requests);
            } catch (error) {
                console.error(error);
                document.getElementById('request-list').innerHTML = `<div class="text-center text-red-500 py-8">Failed to load requests.</div>`;
            }
        }

        function renderList(requests) {
            const container = document.getElementById('request-list');
            if (requests.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400">
                    <i data-lucide="check-circle" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>
                    <p>All caught up! No pending requests.</p>
                </div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = requests.map(req => `
                <div id="card-${req.leave_id}" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                    
                    <!-- Header: Name & Type -->
                    <div class="p-4 border-b border-gray-50 flex justify-between items-start bg-gray-50/50">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full mit-bg-purple text-white flex items-center justify-center font-bold text-sm">
                                ${req.student_name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-900">${req.student_name}</h3>
                                <p class="text-xs text-gray-500">${req.roll_no} • ${req.class_name}</p>
                            </div>
                        </div>
                        <span class="px-2 py-1 bg-white border border-gray-200 text-gray-600 text-xs font-bold rounded shadow-sm">
                            ${req.leave_type}
                        </span>
                    </div>

                    <!-- Body: Details -->
                    <div class="p-4">
                        <div class="flex gap-4 mb-3 text-sm">
                            <div class="flex-1">
                                <span class="block text-xs text-gray-400 uppercase font-bold">Duration</span>
                                <span class="font-medium mit-purple">${req.days} Days</span>
                            </div>
                            <div class="flex-1">
                                <span class="block text-xs text-gray-400 uppercase font-bold">Dates</span>
                                <span class="font-medium text-gray-700">${req.date_range}</span>
                            </div>
                        </div>
                        <div class="bg-purple-50/50 p-3 rounded-lg border border-purple-100">
                            <span class="block text-xs text-purple-400 uppercase font-bold mb-1">Reason</span>
                            <p class="text-sm text-gray-700 italic">"${req.reason}"</p>
                        </div>
                    </div>

                    <!-- Footer: Actions -->
                    <div class="p-3 bg-gray-50 border-t border-gray-100 grid grid-cols-2 gap-3">
                        <button onclick="takeAction(${req.leave_id}, 'Rejected')" 
                            class="py-2.5 rounded-lg border border-gray-300 text-gray-600 text-sm font-bold hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors flex justify-center items-center gap-2">
                            <i data-lucide="x" class="w-4 h-4"></i> Reject
                        </button>
                        <button onclick="takeAction(${req.leave_id}, 'Approved')" 
                            class="py-2.5 rounded-lg mit-bg-purple text-white text-sm font-bold hover:bg-[#350f50] shadow-md transition-all flex justify-center items-center gap-2">
                            <i data-lucide="check" class="w-4 h-4"></i> Approve
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function takeAction(leaveId, action) {
            const card = document.getElementById(`card-${leaveId}`);
            card.style.opacity = '0.5';
            card.style.pointerEvents = 'none';

            try {
                const response = await fetch('/api/staff/leave_action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        leave_id: leaveId,
                        staff_id: userId,
                        action: action
                    })
                });

                if (response.ok) {
                    // Animate removal
                    card.style.transform = 'translateX(100px)';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.remove();
                        // Update count
                        const countEl = document.getElementById('pending-count');
                        countEl.innerText = Math.max(0, parseInt(countEl.innerText) - 1);
                        
                        // Check if empty
                        if(document.getElementById('request-list').children.length === 0) renderList([]);
                    }, 300);
                } else {
                    showToast("Action Failed", "error");
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                }
            } catch (e) {
                console.error(e);
                showToast("Network Error", "error");
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
