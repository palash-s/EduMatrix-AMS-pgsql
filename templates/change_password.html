<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - MIT ADT University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Merriweather', serif; }
        .mit-purple { color: #48166d; } .bg-mit-purple { background-color: #48166d; }
        .hover-mit-purple:hover { background-color: #350f50; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8 fade-in">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="key" class="w-8 h-8 mit-purple"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 serif">Change Your Password</h1>
            <p class="text-gray-500 text-sm mt-2">For security, please set a new password before continuing.</p>
        </div>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg flex items-start gap-3">
            <i id="alert-icon" data-lucide="alert-circle" class="w-5 h-5 mt-0.5"></i>
            <div class="flex-1">
                <p id="alert-text" class="text-sm"></p>
            </div>
        </div>

        <!-- Form -->
        <form id="password-form" class="space-y-5">
            <div class="group">
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input id="current_password" name="current_password" type="password" required 
                        class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#48166d] focus:border-transparent outline-none transition-all" 
                        placeholder="Enter current password">
                </div>
            </div>

            <div class="group">
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="key" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input id="new_password" name="new_password" type="password" required minlength="8"
                        class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#48166d] focus:border-transparent outline-none transition-all" 
                        placeholder="Minimum 8 characters">
                </div>
                <p class="text-xs text-gray-400 mt-1">Must be at least 8 characters long</p>
            </div>

            <div class="group">
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="check-circle" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input id="confirm_password" name="confirm_password" type="password" required 
                        class="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#48166d] focus:border-transparent outline-none transition-all" 
                        placeholder="Re-enter new password">
                </div>
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full py-3.5 px-4 bg-mit-purple hover-mit-purple text-white text-sm font-bold rounded-lg shadow-lg shadow-purple-900/20 transition-all transform active:scale-[0.98] flex justify-center items-center gap-2">
                <span id="btn-text">Update Password</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">&copy; 2025 MIT ADT University - EduMatrix AMS</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert-box');
            const alertText = document.getElementById('alert-text');
            const alertIcon = document.getElementById('alert-icon');
            
            alertBox.classList.remove('hidden', 'bg-red-50', 'bg-green-50', 'border-red-500', 'border-green-500');
            alertText.classList.remove('text-red-700', 'text-green-700');
            alertIcon.classList.remove('text-red-600', 'text-green-600');
            
            if (type === 'error') {
                alertBox.classList.add('bg-red-50', 'border-l-4', 'border-red-500');
                alertText.classList.add('text-red-700');
                alertIcon.classList.add('text-red-600');
            } else {
                alertBox.classList.add('bg-green-50', 'border-l-4', 'border-green-500');
                alertText.classList.add('text-green-700');
                alertIcon.classList.add('text-green-600');
            }
            
            alertText.innerText = message;
            alertBox.classList.remove('hidden');
        }

        document.getElementById('password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const submitBtn = document.getElementById('submit-btn');
            
            // Client-side validation
            if (newPassword !== confirmPassword) {
                showAlert('New passwords do not match.', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters long.', 'error');
                return;
            }
            
            // Show loading state
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Password changed successfully! Redirecting...', 'success');
                    btnText.innerText = 'Success!';
                    btnText.classList.remove('hidden');
                    btnSpinner.classList.add('hidden');
                    submitBtn.classList.remove('bg-mit-purple', 'hover-mit-purple');
                    submitBtn.classList.add('bg-green-600');
                    
                    setTimeout(() => {
                        window.location.replace(data.redirect_url || '/');
                    }, 1500);
                } else {
                    throw new Error(data.error || 'Failed to change password');
                }
            } catch (err) {
                showAlert(err.message, 'error');
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
