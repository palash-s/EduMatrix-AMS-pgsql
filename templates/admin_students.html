<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Directory - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Merriweather', serif; }
        .mit-purple { color: #48166d; }
        .bg-mit-purple { background-color: #48166d; }
        
        .tab-active { border-bottom: 3px solid #48166d; color: #48166d; font-weight: 700; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #48166d; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/admin/dashboard'" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i></button>
            <h1 class="text-xl font-bold text-gray-900 mit-purple serif">Student Directory</h1>
        </div>
        <button onclick="location.reload()" class="p-2 text-gray-400 hover:text-mit-purple"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
    </header>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
        
        <!-- TABS CONTAINER -->
        <div class="mb-6 border-b border-gray-200">
            <nav class="flex space-x-8 overflow-x-auto" id="level-tabs">
                <!-- JS Injects Tabs Here -->
                <div class="animate-pulse h-10 w-24 bg-gray-200 rounded"></div>
            </nav>
        </div>

        <!-- CONTENT CONTAINER -->
        <div id="tab-content" class="space-y-4">
            <div class="text-center py-12 text-gray-400">Select a Class Level to view students.</div>
        </div>

    </main>

    <!-- Action Modal -->
    <div id="status-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm transform transition-all scale-100">
            <h3 class="font-bold text-lg text-gray-900 mb-2">Update Status</h3>
            <p class="text-sm text-gray-500 mb-4">Change academic standing for <span id="modal-student-name" class="font-bold text-purple-700"></span>.</p>
            <input type="hidden" id="modal-student-id">
            
            <div class="space-y-2">
                <button onclick="setStatus('Active')" class="w-full p-3 text-left rounded-lg hover:bg-green-50 border border-transparent hover:border-green-200 text-sm font-medium text-green-800 flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i> Active (Promoted)</button>
                <button onclick="setStatus('Year Down')" class="w-full p-3 text-left rounded-lg hover:bg-orange-50 border border-transparent hover:border-orange-200 text-sm font-medium text-orange-800 flex items-center gap-2"><i data-lucide="arrow-down-circle" class="w-4 h-4"></i> Year Down (Repeat)</button>
                <button onclick="setStatus('Semester Break')" class="w-full p-3 text-left rounded-lg hover:bg-blue-50 border border-transparent hover:border-blue-200 text-sm font-medium text-blue-800 flex items-center gap-2"><i data-lucide="pause-circle" class="w-4 h-4"></i> Semester Break</button>
                <button onclick="setStatus('Dropped')" class="w-full p-3 text-left rounded-lg hover:bg-red-50 border border-transparent hover:border-red-200 text-sm font-medium text-red-800 flex items-center gap-2"><i data-lucide="x-circle" class="w-4 h-4"></i> Left / Dropped Out</button>
            </div>
            
            <button onclick="document.getElementById('status-modal').classList.add('hidden')" class="mt-4 w-full py-2 text-gray-500 text-sm hover:underline">Cancel</button>
        </div>
    </div>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        let directoryData = {};

        document.addEventListener('DOMContentLoaded', loadDirectory);

        async function loadDirectory() {
            try {
                const res = await fetch('/api/admin/directory');
                const data = await res.json();
                directoryData = data.directory;
                renderTabs();
            } catch(e) { console.error(e); }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('level-tabs');
            const levels = Object.keys(directoryData).sort(); 
            
            if (levels.length === 0) {
                tabsContainer.innerHTML = '<span class="py-4 text-gray-400">No data found</span>';
                return;
            }

            tabsContainer.innerHTML = levels.map((lvl, index) => `
                <button onclick="switchTab('${lvl}')" 
                    class="whitespace-nowrap py-4 px-3 border-b-2 font-medium text-sm transition-colors ${index === 0 ? 'tab-active border-mit-purple' : 'tab-inactive border-transparent'} tab-btn" 
                    data-tab="${lvl}">
                    ${lvl}
                </button>
            `).join('');

            switchTab(levels[0]);
        }

        function switchTab(level) {
            // UI Update
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.dataset.tab === level) {
                    btn.classList.add('tab-active', 'border-mit-purple');
                    btn.classList.remove('tab-inactive', 'border-transparent');
                } else {
                    btn.classList.remove('tab-active', 'border-mit-purple');
                    btn.classList.add('tab-inactive', 'border-transparent');
                }
            });

            // Render Collapsible Sections
            const contentContainer = document.getElementById('tab-content');
            const sections = directoryData[level];
            const sectionNames = Object.keys(sections).sort();

            if (sectionNames.length === 0) {
                contentContainer.innerHTML = `<div class="text-center py-12 text-gray-400">No sections found for Level ${level}.</div>`;
                return;
            }

            contentContainer.innerHTML = sectionNames.map(secName => {
                const students = sections[secName];
                // Using Safe ID for JS querySelector (removes spaces/special chars)
                const safeId = `sec-${secName.replace(/[^a-zA-Z0-9]/g, '')}`;

                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <!-- Collapsible Header -->
                    <button onclick="toggleSection('${safeId}')" class="w-full px-6 py-4 bg-white hover:bg-gray-50 border-b border-gray-200 flex justify-between items-center transition-colors text-left focus:outline-none group">
                        <div class="flex items-center gap-3">
                            <div class="p-1.5 bg-purple-50 rounded-lg group-hover:bg-purple-100 transition-colors">
                                <i id="icon-${safeId}" data-lucide="chevron-right" class="w-5 h-5 text-purple-700 transition-transform duration-300"></i>
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg">Section ${secName}</h3>
                        </div>
                        <span class="text-xs font-bold bg-gray-100 text-gray-500 px-3 py-1 rounded-full border border-gray-200">${students.length} Students</span>
                    </button>
                    
                    <!-- Collapsible Content -->
                    <div id="content-${safeId}" class="hidden transition-all duration-300 ease-in-out bg-gray-50/30">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-gray-50 text-gray-500 font-medium border-y border-gray-200">
                                    <tr>
                                        <th class="p-4 w-32 pl-6">Roll No</th>
                                        <th class="p-4">Name</th>
                                        <th class="p-4 w-32 text-center">Status</th>
                                        <th class="p-4 w-24 text-right pr-6">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 bg-white">
                                    ${students.map(s => `
                                        <tr class="hover:bg-purple-50/30 transition-colors group">
                                            <td class="p-4 pl-6 font-mono text-xs text-gray-500 font-bold">${s.roll}</td>
                                            <td class="p-4 font-semibold text-gray-800">${s.name}</td>
                                            <td class="p-4 text-center">
                                                <span class="px-2 py-1 rounded text-[10px] font-bold uppercase border 
                                                    ${s.status === 'Active' ? 'bg-green-50 text-green-700 border-green-200' : 
                                                      (s.status === 'Year Down' ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-red-50 text-red-700 border-red-200')}">
                                                    ${s.status}
                                                </span>
                                            </td>
                                            <td class="p-4 pr-6 text-right">
                                                <button onclick="openStatusModal('${s.id}', '${s.name}')" class="p-2 text-gray-400 hover:text-mit-purple hover:bg-purple-50 rounded-lg transition-all">
                                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            lucide.createIcons();
        }

        function toggleSection(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(90deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function openStatusModal(id, name) {
            document.getElementById('modal-student-id').value = id;
            document.getElementById('modal-student-name').innerText = name;
            document.getElementById('status-modal').classList.remove('hidden');
        }

        async function setStatus(status) {
            const id = document.getElementById('modal-student-id').value;
            try {
                const res = await fetch('/api/admin/update_student_status', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: id, status: status })
                });
                if(res.ok) {
                    document.getElementById('status-modal').classList.add('hidden');
                    loadDirectory(); 
                } else { showToast("Failed to update", "error"); }
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
