<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback - MIT ADT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-white border-b px-6 h-16 flex items-center gap-3 shadow-sm">
        <button onclick="window.location.href='/student/dashboard'" class="p-2 -ml-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-5 h-5 text-gray-500"></i></button>
        <h1 class="font-bold text-lg text-purple-800">Course Exit Survey</h1>
    </header>

    <main class="max-w-3xl mx-auto p-6">
        <div id="subject-list" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Loading pending feedback...</p>
        </div>
    </main>

    <!-- Feedback Modal -->
    <div id="form-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-4 border-b bg-gray-50 flex justify-between">
                <h3 class="font-bold text-gray-800" id="form-title">...</h3>
                <button onclick="closeForm()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 overflow-y-auto flex-grow" id="questions-container">
                <!-- Questions injected here -->
            </div>
            <div class="p-4 border-t bg-gray-50 text-right">
                <button onclick="submitForm()" class="px-6 py-2 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700">Submit Anonymous Feedback</button>
            </div>
        </div>
    </div>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        const userId = sessionStorage.getItem('user_id');
        let currentCycleId = null;
        let currentSubjectId = null;
        let currentSectionId = null; // Need to fetch from profile or context
        let currentTeacherId = null;
        let questions = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Get Questions
            const qRes = await fetch('/api/feedback/questions');
            questions = (await qRes.json()).questions;
            
            // 2. Get Pending List
            loadList();
        });

        async function loadList() {
            const res = await fetch(`/api/feedback/pending_list?user_id=${userId}`);
            const data = await res.json();
            
            const container = document.getElementById('subject-list');
            if(!data.active || data.subjects.length === 0) {
                container.innerHTML = `<div class="text-center py-20"><i data-lucide="check-circle" class="w-16 h-16 text-green-500 mx-auto mb-4"></i><h2 class="text-xl font-bold text-gray-800">All Caught Up!</h2><p class="text-gray-500">You have completed all feedback.</p><button onclick="window.location.href='/student/dashboard'" class="mt-6 px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Return Home</button></div>`;
                lucide.createIcons();
                return;
            }

            // Save cycle ID
            // Ideally cycle_id comes from api, let's fetch it separately if needed or assume active.
            // For now, let's fetch active cycle to get ID
            const cycRes = await fetch('/api/feedback/active_cycle');
            const cycData = await cycRes.json();
            currentCycleId = cycData.id;

            // Fetch student profile for section_id
            const profRes = await fetch(`/api/student/dashboard?user_id=${userId}`);
            const profData = await profRes.json();
            // We need the raw section_id, but dashboard returns class name. 
            // Better to pass section_id in pending_list response or assume backend handles it.
            // Let's pass it in pending_list. (I'll update backend API slightly to include section_id in list response or just handle it in submit).
            // Actually, we can just fetch student profile again or trust the backend to know section from context.
            // Let's rely on 'get_student_dashboard' returns. Or just fetch profile directly.
            // To be safe, let's get section_id from a lightweight profile call or assume we have it.
            // Simplified: User clicks subject -> we know subject. We need teacher & section.
            // The 'pending_list' API provided teacher_id.
            
            container.innerHTML = data.subjects.map(s => `
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center hover:shadow-md transition-shadow">
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">${s.subject_name}</h3>
                        <p class="text-sm text-gray-500">Faculty: <span class="font-semibold text-purple-700">${s.teacher_name}</span></p>
                    </div>
                    <button onclick="openForm('${s.subject_id}', '${s.teacher_id}', '${s.subject_name}')" class="px-4 py-2 bg-white border border-purple-200 text-purple-700 font-bold rounded-lg hover:bg-purple-50 transition-colors">Start Survey</button>
                </div>
            `).join('');
        }

        function openForm(subId, teachId, subName) {
            currentSubjectId = subId;
            currentTeacherId = teachId;
            document.getElementById('form-title').innerText = `Feedback: ${subName}`;
            document.getElementById('form-modal').classList.remove('hidden');
            
            // Render Questions
            const qContainer = document.getElementById('questions-container');
            qContainer.innerHTML = questions.map(q => `
                <div class="mb-6 question-block" data-qid="${q.id}">
                    <p class="font-medium text-gray-800 mb-3">${q.text}</p>
                    <div class="flex gap-4 items-center">
                        <label class="cursor-pointer"><input type="radio" name="q${q.id}" value="1" class="hidden peer"><span class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 hover:bg-gray-100 transition-all">1</span></label>
                        <label class="cursor-pointer"><input type="radio" name="q${q.id}" value="2" class="hidden peer"><span class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-gray-100 transition-all">2</span></label>
                        <label class="cursor-pointer"><input type="radio" name="q${q.id}" value="3" class="hidden peer"><span class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center peer-checked:bg-yellow-500 peer-checked:text-white peer-checked:border-yellow-500 hover:bg-gray-100 transition-all">3</span></label>
                        <label class="cursor-pointer"><input type="radio" name="q${q.id}" value="4" class="hidden peer"><span class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center peer-checked:bg-lime-500 peer-checked:text-white peer-checked:border-lime-500 hover:bg-gray-100 transition-all">4</span></label>
                        <label class="cursor-pointer"><input type="radio" name="q${q.id}" value="5" class="hidden peer"><span class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center peer-checked:bg-green-600 peer-checked:text-white peer-checked:border-green-600 hover:bg-gray-100 transition-all">5</span></label>
                    </div>
                </div>
            `).join('');
        }
        
        async function submitForm() {
            // Collect Ratings
            const responses = {};
            let allAnswered = true;
            
            questions.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (!selected) allAnswered = false;
                else responses[q.id] = selected.value;
            });
            
            if (!allAnswered) return showToast("Please answer all questions.", "error");
            
            // Get student's section ID (needed for DB)
            // We can fetch it once or assume the backend handles it.
            // Let's do a quick fetch to be safe or pass it from dashboard.
            // Hack: We'll fetch it inside the submit API on backend using student_id
            
            // Updated Payload
            const payload = {
                student_id: userId,
                cycle_id: currentCycleId,
                subject_id: currentSubjectId,
                teacher_id: currentTeacherId,
                section_id: 1, // PLACEHOLDER: Backend should look this up from StudentProfile
                responses: responses
            };

            try {
                // NOTE: I need to update the backend 'submit_feedback' to lookup section_id if not passed
                // For now, let's assume we update backend in next step.
                const res = await fetch('/api/feedback/submit', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    showToast("Feedback Submitted Successfully!");
                    closeForm();
                    loadList();
                } else showToast("Failed to submit.", "error");
            } catch(e) { showToast("Network Error", "error"); }
        }

        function closeForm() { document.getElementById('form-modal').classList.add('hidden'); }
    </script>
</body>
</html>
