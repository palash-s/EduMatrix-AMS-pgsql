<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detention Review Inbox - MIT ADT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@700&display=swap'); 
        body { font-family: 'Inter', sans-serif; }
        .mit-purple { color: #48166d; } .bg-mit-purple { background-color: #48166d; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <h1 class="font-bold text-lg mit-purple" style="font-family: 'Merriweather', serif;">Detention Review Inbox</h1>
        </div>
        <div class="text-xs font-bold bg-red-50 text-red-700 px-3 py-1 rounded-lg border border-red-200">
            Awaiting Review: <span id="review-count">0</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-6 p-6">
        
        <!-- Instruction / Status -->
        <div id="status-message" class="mb-6 p-4 bg-gray-100 rounded-xl border border-gray-200 text-gray-600 text-sm">
            Select a submission below to view the attached assignment and release the student.
        </div>

        <!-- Review List Container -->
        <div id="review-list-container" class="space-y-4">
            <div class="animate-pulse p-6 bg-white rounded-xl shadow-sm border border-gray-200 h-24"></div>
        </div>
    </main>

    <!-- REVIEW MODAL -->
    <div id="review-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-2xl">
            <h2 class="text-xl font-bold mit-purple serif mb-4">Review Submission</h2>
            
            <input type="hidden" id="modal-detention-id">

            <div class="space-y-4">
                <div class="p-3 bg-red-50 rounded-lg border border-red-200">
                    <p class="text-sm font-bold text-red-700 mb-1" id="modal-student-info">Student: [Name] ([Roll])</p>
                    <p class="text-xs text-gray-600">Reason: <span id="modal-reason" class="font-medium"></span></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Assigned Task</label>
                    <p id="modal-assigned-task" class="p-3 border rounded-lg bg-gray-50 text-sm max-h-24 overflow-y-auto"></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Submitted Document Link</label>
                    <a id="modal-submission-link" target="_blank" class="block w-full py-2 px-3 bg-blue-50 text-blue-700 rounded-lg font-bold text-sm hover:bg-blue-100 transition-colors">
                        <i data-lucide="external-link" class="w-4 h-4 inline mr-2"></i> View Submitted Work
                    </a>
                </div>
            </div>

            <div class="mt-8 flex justify-between gap-3 pt-4 border-t border-gray-100">
                <button onclick="performReviewAction('Assigned')" class="px-4 py-2 bg-orange-100 text-orange-700 rounded-lg text-sm font-bold hover:bg-orange-200 border border-orange-300">
                    Require Revision
                </button>
                <div class="flex gap-3">
                    <button onclick="document.getElementById('review-modal').classList.add('hidden')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-bold">Close</button>
                    <button onclick="performReviewAction('Released')" class="px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700 shadow-md transition-colors active:scale-95">
                        <i data-lucide="check" class="w-4 h-4 inline mr-1"></i> Release Student
                    </button>
                </div>
            </div>
        </div>
    </div>

    {% include '_toast_modal.html' %}

    <script>
        lucide.createIcons();
        let staffId = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            // SECURITY: Validate session with server before loading
            try {
                const meRes = await fetch('/api/me', { credentials: 'same-origin' });
                if (!meRes.ok) { window.location.replace('/'); return; }
                const meData = await meRes.json();
                if (meData.must_change_password) { window.location.replace('/change-password'); return; }
                staffId = meData.user_id;
            } catch (e) { window.location.replace('/'); return; }

            loadReviewList();
        });

        async function loadReviewList() {
            try {
                const res = await fetch(`/api/detention/review_list?user_id=${staffId}`);
                const data = await res.json();
                renderReviewList(data.reviews);
            } catch (e) {
                document.getElementById('review-list-container').innerHTML = `<p class="p-6 text-center text-red-500">Failed to load submissions.</p>`;
            }
        }

        function renderReviewList(reviews) {
            const container = document.getElementById('review-list-container');
            document.getElementById('review-count').innerText = reviews.length;

            if (reviews.length === 0) {
                container.innerHTML = `<p class="p-6 text-center text-green-600 bg-white rounded-xl border border-green-200">No tasks awaiting review.</p>`;
                document.getElementById('status-message').classList.add('hidden');
                return;
            }
            
            document.getElementById('status-message').classList.remove('hidden');

            container.innerHTML = reviews.map(r => `
                <div onclick="openReviewModal(${r.id}, '${r.student_name}', '${r.roll}', '${r.reason}', '${r.submission_url}', '${r.submission_url}')"
                     class="bg-white p-4 rounded-xl shadow-sm border border-yellow-200 hover:border-yellow-400 cursor-pointer transition-all flex justify-between items-center group">
                    <div>
                        <h4 class="font-bold text-gray-800">${r.student_name} (${r.roll})</h4>
                        <p class="text-xs text-gray-500 mt-1">Reason: ${r.reason}</p>
                    </div>
                    <span class="text-xs font-bold px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full border border-yellow-200">
                        Submitted
                    </span>
                </div>
            `).join('');
        }

        function openReviewModal(id, name, roll, reason, task, submission) {
            document.getElementById('modal-detention-id').value = id;
            document.getElementById('modal-student-info').innerText = `Student: ${name} (${roll})`;
            document.getElementById('modal-reason').innerText = reason;
            document.getElementById('modal-assigned-task').innerText = task;
            
            const link = document.getElementById('modal-submission-link');
            link.href = submission;
            link.innerText = 'View Submitted Work';
            
            document.getElementById('review-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        async function performReviewAction(finalStatus) {
            const detId = document.getElementById('modal-detention-id').value;

            const doRequest = async () => {
                const btn = document.querySelector(`button[onclick="performReviewAction('${finalStatus}')"]`);
                const originalText = btn.innerText;
                btn.innerText = 'Updating...'; btn.disabled = true;

                try {
                    const res = await fetch('/api/detention/release', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ detention_id: detId, final_status: finalStatus })
                    });

                    if (res.ok) {
                        showToast(`Student status set to ${finalStatus}.`);
                        document.getElementById('review-modal').classList.add('hidden');
                        loadReviewList();
                    } else {
                        showToast("Action Failed.", "error");
                    }
                } catch (e) {
                    showToast("Network Error.", "error");
                } finally {
                    btn.innerText = originalText; btn.disabled = false;
                }
            };

            if (finalStatus === 'Assigned') {
                return showConfirm(
                    "Confirm Action",
                    "Send back for Revision? Student will see 'Active Detention' again.",
                    doRequest,
                    "Detention Review"
                );
            }

            return doRequest();
        }
    </script>
</body>
</html>
